<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #ff758c,
        #ff7eb3,
        #ffc3a0,
        #ffafbd
    );
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    font-family:'Segoe UI',sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    z-index:10;
}

#heart{
    font-size:180px;
    cursor:pointer;
    user-select:none;
    transition:.5s;
    animation:pulse 1.5s infinite;
    filter:
    drop-shadow(0 0 20px #ff0066)
    drop-shadow(0 0 50px #ff0066)
    drop-shadow(0 0 90px #ff0066);
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

.clicked{
    transform:scale(1.3);
}

#message{
    width:90%;
    max-width:700px;
    margin:auto;
    margin-top:30px;
    color:white;
    font-size:28px;
    line-height:1.7;
    font-weight:600;
    text-shadow:0 0 15px rgba(255,255,255,.8);
}

.flower{
    position:absolute;
    top:-50px;
    font-size:28px;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:
        translateY(120vh)
        rotate(720deg);
        opacity:0;
    }
}

.float-heart{
    position:absolute;
    color:white;
    opacity:.5;
    pointer-events:none;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
        opacity:0;
    }
}

.sparkle{
    position:absolute;
    color:white;
    animation:spark 3s linear forwards;
}

@keyframes spark{
    from{
        opacity:1;
        transform:scale(0);
    }
    to{
        opacity:0;
        transform:scale(2);
    }
}
</style>
</head>
<body>

<div class="container">

    <div id="heart">❤️</div>

    <div id="message"></div>

</div>

<script>

const heart=document.getElementById("heart");
const message=document.getElementById("message");

let shown=false;

heart.addEventListener("click",()=>{

    if(shown) return;

    shown=true;

    heart.classList.add("clicked");

    flowerRain();

    typeWriter(
`You came into my life unexpectedly,

and somehow every day feels a little brighter with you in it. ❤️

I don't know where this journey will take us,

but I know I'm smiling more since you arrived. ✨

Thank you for being the most beautiful surprise in my life. 🌹`
    );

});

function typeWriter(text){

    let i=0;

    const speed=40;

    const typing=setInterval(()=>{

        message.innerHTML += text.charAt(i);

        i++;

        if(i>=text.length){

            clearInterval(typing);

        }

    },speed);
}

function flowerRain(){

    for(let i=0;i<120;i++){

        const flower=document.createElement("div");

        flower.className="flower";

        const flowers=[
        "🌸","🌺","🌷","🌹","💮"
        ];

        flower.innerHTML=
        flowers[Math.floor(Math.random()*flowers.length)];

        flower.style.left=
        Math.random()*100+"vw";

        flower.style.animationDuration=
        (Math.random()*3+3)+"s";

        flower.style.fontSize=
        (Math.random()*20+20)+"px";

        document.body.appendChild(flower);

        setTimeout(()=>{
            flower.remove();
        },7000);
    }
}

function floatingHearts(){

    const h=document.createElement("div");

    h.className="float-heart";

    h.innerHTML="❤";

    h.style.left=Math.random()*100+"vw";

    h.style.fontSize=
    (Math.random()*25+15)+"px";

    h.style.animationDuration=
    (Math.random()*6+4)+"s";

    document.body.appendChild(h);

    setTimeout(()=>{
        h.remove();
    },10000);
}

setInterval(floatingHearts,400);

function sparkles(){

    const s=document.createElement("div");

    s.className="sparkle";

    s.innerHTML="✨";

    s.style.left=Math.random()*100+"vw";

    s.style.top=Math.random()*100+"vh";

    document.body.appendChild(s);

    setTimeout(()=>{
        s.remove();
    },3000);
}

setInterval(sparkles,300);

</script>

</body>
</html>
